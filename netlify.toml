# CONFIGURACIÓN NETLIFY - SECOP II INTELLIGENCE
# Copiar este archivo a la raíz del repositorio

[build]
  command = "npm install && npm run build"
  functions = "netlify/functions"
  publish = "."

[dev]
  functions = "netlify/functions"
  command = "npm run dev"
  port = 8888

# ========== VARIABLES DE ENTORNO ==========
[build.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"

# ========== REDIRECCIONES ==========
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ========== HEADERS DE SEGURIDAD ==========
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"

    # CORS - Ajustar según sea necesario
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# ========== CACHE ==========
[[headers]]
  for = "/secop-intelligence.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# ========== FUNCIONES SERVERLESS ==========
[functions]
  external_node_modules = ["openai", "axios", "nodemailer", "exceljs"]
  node_bundler = "esbuild"
